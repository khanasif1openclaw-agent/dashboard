name: Build and Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [ master ]
  schedule:
    - cron: '0 20 * * *' # daily at 20:00 UTC (~6am AEST)
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install deps
        run: |
          cd dashboard
          npm ci

      - name: Fetch fresh data
        run: |
          cd dashboard
          node build.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
